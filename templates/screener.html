{% extends "base.html" %}
{% set active_page = 'screener' %}
{% block title %}الفلتر المتقدم{% endblock %}
{% block page_title %}<i class="fas fa-filter" style="color:#2196F3;margin-left:8px"></i> الفلتر المتقدم{% endblock %}
{% block head %}
<style>
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.filter-btn{padding:8px 16px;border-radius:20px;border:1px solid #1e2a3a;background:#131722;color:#aaa;cursor:pointer;font-size:13px;transition:.2s}
.filter-btn:hover{background:#1e2a3a;color:#fff}
.filter-btn.active{background:#2196F3;color:#fff;border-color:#2196F3}
.sliders{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:20px;padding:20px;background:#131722;border-radius:12px;border:1px solid #1e2a3a}
.slider-group label{display:block;font-size:13px;color:#888;margin-bottom:6px}
.slider-group input[type=range]{width:100%;accent-color:#2196F3}
.slider-group .val{color:#fff;font-size:14px;font-weight:700;float:left}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:20px}
.stock-card{background:#131722;border-radius:12px;padding:16px;border:1px solid #1e2a3a;cursor:pointer;transition:.2s}
.stock-card:hover{border-color:#2196F3;background:#0d111c}
.stock-card .sym{font-size:16px;font-weight:700;color:#fff}
.stock-card .name{font-size:12px;color:#888;margin:4px 0}
.stock-card .price{font-size:20px;font-weight:700;margin:4px 0}
.stock-card .meta{display:flex;gap:12px;font-size:12px;color:#888;margin-top:8px}
.stock-card .meta span{background:#0d111c;padding:2px 10px;border-radius:10px}
</style>
{% endblock %}
{% block content %}
<div class="filters" id="filterBar">
<button class="filter-btn active" data-filter="">الكل</button>
<button class="filter-btn" data-filter="golden">تقاطع ذهبي</button>
<button class="filter-btn" data-filter="death">تقاطع موت</button>
<button class="filter-btn" data-filter="uptrend">اتجاه صاعد</button>
<button class="filter-btn" data-filter="downtrend">اتجاه هابط</button>
<button class="filter-btn" data-filter="rsi_low">مضروب RSI</button>
<button class="filter-btn" data-filter="rsi_high">شراء زائد RSI</button>
<button class="filter-btn" data-filter="volume">حجم كبير</button>
<button class="filter-btn" data-filter="adx">قوة اتجاه</button>
</div>

<div class="sliders">
<div class="slider-group">
<label>الحد الأدنى للتقييم <span class="val" id="scoreVal">0</span></label>
<input type="range" id="scoreSlider" min="-10" max="10" value="0" step="0.5">
</div>
<div class="slider-group">
<label>الحد الأعلى RSI <span class="val" id="rsiHighVal">100</span></label>
<input type="range" id="rsiHighSlider" min="0" max="100" value="100">
</div>
<div class="slider-group">
<label>الحد الأدنى ADX <span class="val" id="adxMinVal">0</span></label>
<input type="range" id="adxMinSlider" min="0" max="50" value="0">
</div>
</div>

<div class="grid" id="resultsGrid">
<div class="loading">جاري التحميل...</div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentFilter = "";
document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentFilter = btn.dataset.filter;
        loadData();
    };
});
document.getElementById("scoreSlider").oninput = function() {
    document.getElementById("scoreVal").textContent = this.value;
    loadData();
};
document.getElementById("rsiHighSlider").oninput = function() {
    document.getElementById("rsiHighVal").textContent = this.value;
    loadData();
};
document.getElementById("adxMinSlider").oninput = function() {
    document.getElementById("adxMinVal").textContent = this.value;
    loadData();
};
function loadData() {
    const g = document.getElementById("resultsGrid");
    g.innerHTML = '<div class="loading">جاري التحميل...</div>';
    const minScore = parseFloat(document.getElementById("scoreSlider").value);
    const maxRsi = parseFloat(document.getElementById("rsiHighSlider").value);
    const minAdx = parseFloat(document.getElementById("adxMinSlider").value);
    fetch(`/api/screener?filter=${currentFilter}`).then(r=>r.json()).then(d => {
        let items = d.results || [];
        items = items.filter(x => {
            if (x.score < minScore) return false;
            if (x.rsi && x.rsi > maxRsi) return false;
            if (x.adx && x.adx < minAdx) return false;
            return true;
        });
        if (!items.length) { g.innerHTML = '<div class="loading">لا توجد نتائج</div>'; return; }
        g.innerHTML = items.map(x => `
            <div class="stock-card" onclick="location.href='/user/{{ uid }}/price?symbol=${x.symbol}'">
            <div class="sym">${x.symbol}</div>
            <div class="name">${x.name || ''}</div>
            <div class="price ${x.change >= 0 ? 'price-up' : 'price-down'}">${x.price || '—'}</div>
            <div class="meta">
                ${x.rsi ? `<span>RSI: ${x.rsi.toFixed(1)}</span>` : ''}
                ${x.adx ? `<span>ADX: ${x.adx.toFixed(1)}</span>` : ''}
                ${x.score ? `<span>تقييم: ${x.score.toFixed(1)}</span>` : ''}
            </div>
            </div>
        `).join('');
    }).catch(() => { g.innerHTML = '<div class="loading">❌ خطأ في التحميل</div>'; });
}
loadData();
setInterval(loadData, 60000);
</script>
{% endblock %}
