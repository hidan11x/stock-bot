<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>خطأ</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0f0f1a;color:#e0e0e0;padding:20px;direction:rtl;display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{background:#1a1a2e;border-radius:12px;padding:40px;border:1px solid #2a2a4a;text-align:center;max-width:500px}
.box h1{font-size:24px;margin-bottom:16px}
.box p{font-size:16px;color:#888;margin-bottom:20px;line-height:1.6}
.box a{background:#448aff;color:#fff;padding:10px 24px;border-radius:8px;text-decoration:none;display:inline-block}
</style>
</head>
<body>
<div class="box">
<h1>❌ {{ msg }}</h1>
<p>تأكد من صحة الرابط أو رمز السهم</p>
<a href="/user/{{ uid }}">← الرجوع للرئيسية</a>
</div>
</body>
</html>
